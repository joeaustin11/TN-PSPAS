<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TN-PSPAS | Tamil Nadu Problem Statement Priority Auction System</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --primary: #c8330a;
  --primary-dark: #9e2507;
  --primary-light: #f0501e;
  --gold: #e8a020;
  --gold-light: #f5c842;
  --dark: #0d0f14;
  --darker: #070910;
  --surface: #13161e;
  --surface2: #1a1e2a;
  --surface3: #222736;
  --border: rgba(200,51,10,0.2);
  --border2: rgba(255,255,255,0.07);
  --text: #e8eaf0;
  --text-muted: #7a7f96;
  --text-dim: #4a4f66;
  --green: #1db87a;
  --blue: #2d8ef0;
  --purple: #7c3aed;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans', sans-serif;
  background: var(--darker);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background: var(--darker); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius:3px; }

/* ══════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════ */
#loginScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--darker);
  position: relative;
  overflow: hidden;
}

.login-bg {
  position: absolute; inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(200,51,10,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 90% 90%, rgba(232,160,32,0.08) 0%, transparent 60%);
}

.login-grid {
  position: absolute; inset:0;
  background-image:
    linear-gradient(rgba(200,51,10,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,51,10,0.05) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
}

.login-box {
  position: relative;
  width: 480px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
  animation: slideUp 0.6s cubic-bezier(0.22,1,0.36,1);
}

@keyframes slideUp {
  from { opacity:0; transform: translateY(30px); }
  to   { opacity:1; transform: translateY(0); }
}

.login-header {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  padding: 32px 36px 28px;
  position: relative;
  overflow: hidden;
}

.login-header::after {
  content:'';
  position:absolute; bottom:-20px; right:-20px;
  width:120px; height:120px;
  border-radius:50%;
  background: rgba(255,255,255,0.05);
}

.login-emblem {
  display:flex; align-items:center; gap:14px; margin-bottom:16px;
}

.emblem-icon {
  width:48px; height:48px;
  background: rgba(255,255,255,0.15);
  border-radius:2px;
  display:flex; align-items:center; justify-content:center;
  font-size:24px;
}

.login-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  margin-bottom: 2px;
}

.login-subtitle {
  font-family: 'Rajdhani', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
}

.login-body { padding: 32px 36px; }

.role-selector {
  display: grid; grid-template-columns: repeat(3,1fr); gap:8px;
  margin-bottom: 24px;
}

.role-btn {
  padding: 10px 6px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 2px;
  color: var(--text-muted);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.role-btn:hover { border-color: var(--primary); color: var(--text); }
.role-btn.active {
  background: rgba(200,51,10,0.15);
  border-color: var(--primary);
  color: var(--primary-light);
}

.form-group { margin-bottom: 18px; }
.form-label {
  display:block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.form-input {
  width:100%;
  padding: 12px 14px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 2px;
  color: var(--text);
  font-family: 'Noto Sans', sans-serif;
  font-size: 14px;
  transition: border-color 0.2s;
  outline: none;
}

.form-input:focus { border-color: var(--primary); }
.form-input::placeholder { color: var(--text-dim); }

.btn-login {
  width:100%;
  padding: 14px;
  background: var(--primary);
  border: none;
  border-radius: 2px;
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 6px;
}

.btn-login:hover { background: var(--primary-light); transform: translateY(-1px); }
.btn-login:active { transform: translateY(0); }

.demo-hint {
  margin-top: 16px;
  padding: 12px 14px;
  background: rgba(232,160,32,0.08);
  border: 1px solid rgba(232,160,32,0.2);
  border-radius: 2px;
  font-size: 12px;
  color: var(--gold);
  line-height: 1.6;
}

/* ══════════════════════════════════════
   MAIN APP LAYOUT
══════════════════════════════════════ */
#app { display:none; min-height:100vh; }

.app-layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  grid-template-rows: 56px 1fr;
  min-height: 100vh;
}

/* ── TOP BAR ── */
.topbar {
  grid-column: 1/-1;
  background: var(--surface);
  border-bottom: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  z-index: 100;
}

.topbar-brand {
  display:flex; align-items:center; gap:10px;
}

.brand-badge {
  background: var(--primary);
  color:#fff;
  font-family:'Rajdhani',sans-serif;
  font-size:11px; font-weight:700;
  letter-spacing:2px;
  padding:3px 8px;
  border-radius:2px;
}

.brand-name {
  font-family:'Rajdhani',sans-serif;
  font-size:15px; font-weight:600;
  color: var(--text-muted);
  letter-spacing:1px;
}

.topbar-right {
  display:flex; align-items:center; gap:16px;
}

.user-chip {
  display:flex; align-items:center; gap:8px;
  padding: 6px 14px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius:2px;
}

.user-dot {
  width:8px; height:8px; border-radius:50%;
}

.user-name {
  font-family:'Rajdhani',sans-serif;
  font-size:13px; font-weight:600;
  letter-spacing:1px;
}

.btn-logout {
  padding: 6px 14px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius:2px;
  color: var(--text-muted);
  font-family:'Rajdhani',sans-serif;
  font-size:12px; font-weight:600;
  letter-spacing:2px;
  cursor:pointer;
  transition:all 0.2s;
}
.btn-logout:hover { border-color:var(--primary); color:var(--primary-light); }

/* ── SIDEBAR ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border2);
  padding: 20px 0;
  overflow-y: auto;
}

.nav-section-label {
  padding: 6px 20px 4px;
  font-size:10px; font-weight:700;
  letter-spacing:3px; text-transform:uppercase;
  color: var(--text-dim);
}

.nav-item {
  display:flex; align-items:center; gap:12px;
  padding: 11px 20px;
  color: var(--text-muted);
  font-family:'Noto Sans',sans-serif;
  font-size:13px;
  cursor:pointer;
  transition:all 0.15s;
  border-left: 2px solid transparent;
  margin: 1px 0;
}

.nav-item:hover { background:rgba(200,51,10,0.06); color:var(--text); }
.nav-item.active {
  background:rgba(200,51,10,0.12);
  border-left-color: var(--primary);
  color: var(--primary-light);
}

.nav-icon { font-size:16px; width:20px; text-align:center; }

/* ── MAIN CONTENT ── */
.main-content {
  overflow-y: auto;
  background: var(--darker);
  padding: 28px 32px;
}

/* ── PAGE HEADER ── */
.page-header {
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border2);
}

.page-title {
  font-family:'Rajdhani',sans-serif;
  font-size:26px; font-weight:700;
  color: var(--text);
  letter-spacing:1px;
  margin-bottom: 4px;
}

.page-subtitle {
  font-size:13px;
  color: var(--text-muted);
}

/* ── STAT CARDS ── */
.stat-grid {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:16px;
  margin-bottom: 28px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius:2px;
  padding: 20px;
  position:relative;
  overflow:hidden;
  transition: border-color 0.2s;
}

.stat-card:hover { border-color: var(--primary); }

.stat-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity:0;
  transition:opacity 0.2s;
}
.stat-card:hover::before { opacity:1; }

.stat-label {
  font-size:10px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase;
  color:var(--text-dim);
  margin-bottom:10px;
}

.stat-value {
  font-family:'Rajdhani',sans-serif;
  font-size:32px; font-weight:700;
  color:var(--text);
  line-height:1;
  margin-bottom:6px;
}

.stat-change {
  font-size:12px; color:var(--green);
}

.stat-icon {
  position:absolute; right:16px; top:16px;
  font-size:28px; opacity:0.15;
}

/* ── SECTION CARDS ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius:2px;
  margin-bottom: 20px;
}

.card-header {
  display:flex; align-items:center; justify-content:space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border2);
}

.card-title {
  font-family:'Rajdhani',sans-serif;
  font-size:15px; font-weight:700;
  letter-spacing:1px;
  color:var(--text);
}

.card-body { padding: 20px; }

/* ── TABLES ── */
.data-table { width:100%; border-collapse:collapse; }
.data-table th {
  padding: 10px 14px;
  text-align:left;
  font-size:10px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase;
  color:var(--text-dim);
  border-bottom: 1px solid var(--border2);
}

.data-table td {
  padding: 13px 14px;
  font-size:13px;
  color:var(--text-muted);
  border-bottom: 1px solid rgba(255,255,255,0.03);
  vertical-align:middle;
}

.data-table tr:hover td { background:rgba(200,51,10,0.04); }
.data-table tr:last-child td { border-bottom:none; }

/* ── BADGES ── */
.badge {
  display:inline-flex; align-items:center; gap:5px;
  padding: 3px 9px;
  border-radius:2px;
  font-size:11px; font-weight:600;
  letter-spacing:1px; text-transform:uppercase;
}

.badge-green  { background:rgba(29,184,122,0.12); color:var(--green); }
.badge-red    { background:rgba(200,51,10,0.15); color:var(--primary-light); }
.badge-gold   { background:rgba(232,160,32,0.12); color:var(--gold); }
.badge-blue   { background:rgba(45,142,240,0.12); color:var(--blue); }
.badge-purple { background:rgba(124,58,237,0.12); color:#a78bfa; }

/* ── SCORE BAR ── */
.score-bar-wrap { display:flex; align-items:center; gap:10px; }
.score-bar {
  flex:1; height:6px;
  background:var(--surface3);
  border-radius:3px; overflow:hidden;
}

.score-fill {
  height:100%;
  border-radius:3px;
  transition:width 1s cubic-bezier(0.22,1,0.36,1);
}

.score-val {
  font-family:'JetBrains Mono',monospace;
  font-size:12px; font-weight:600;
  color:var(--text); width:36px; text-align:right;
}

/* ── FORMS ── */
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.form-row.single { grid-template-columns:1fr; }
.form-row.triple { grid-template-columns:1fr 1fr 1fr; }

.field-group { display:flex; flex-direction:column; gap:6px; }
.field-label {
  font-size:11px; font-weight:600;
  letter-spacing:2px; text-transform:uppercase;
  color:var(--text-muted);
}

.field-input, .field-select, .field-textarea {
  padding: 10px 12px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius:2px;
  color:var(--text);
  font-family:'Noto Sans',sans-serif;
  font-size:13px;
  outline:none;
  transition:border-color 0.2s;
}

.field-input:focus, .field-select:focus, .field-textarea:focus {
  border-color:var(--primary);
}

.field-select { cursor:pointer; }
.field-textarea { resize:vertical; min-height:90px; }
.field-input::placeholder, .field-textarea::placeholder { color:var(--text-dim); }

/* ── BUTTONS ── */
.btn {
  padding: 10px 20px;
  border-radius:2px;
  font-family:'Rajdhani',sans-serif;
  font-size:13px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase;
  cursor:pointer; border:none;
  transition:all 0.2s;
  display:inline-flex; align-items:center; gap:8px;
}

.btn-primary {
  background:var(--primary); color:#fff;
}
.btn-primary:hover { background:var(--primary-light); transform:translateY(-1px); }

.btn-outline {
  background:transparent;
  border:1px solid var(--border2);
  color:var(--text-muted);
}
.btn-outline:hover { border-color:var(--primary); color:var(--primary-light); }

.btn-gold {
  background:var(--gold); color:var(--darker);
}
.btn-gold:hover { background:var(--gold-light); }

.btn-sm { padding:7px 14px; font-size:11px; }

/* ── RANK MEDAL ── */
.rank-medal {
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:'Rajdhani',sans-serif;
  font-size:13px; font-weight:700;
}

.rank-1 { background:rgba(232,160,32,0.2); color:var(--gold); border:1px solid rgba(232,160,32,0.4); }
.rank-2 { background:rgba(192,192,192,0.15); color:#c0c0c0; border:1px solid rgba(192,192,192,0.3); }
.rank-3 { background:rgba(205,127,50,0.15); color:#cd7f32; border:1px solid rgba(205,127,50,0.3); }
.rank-other { background:var(--surface2); color:var(--text-dim); border:1px solid var(--border2); }

/* ── ALERT ── */
.alert {
  padding: 12px 16px;
  border-radius:2px;
  font-size:13px;
  margin-bottom:16px;
  display:flex; align-items:center; gap:10px;
}

.alert-success { background:rgba(29,184,122,0.1); border:1px solid rgba(29,184,122,0.3); color:var(--green); }
.alert-warning { background:rgba(232,160,32,0.1); border:1px solid rgba(232,160,32,0.3); color:var(--gold); }
.alert-info    { background:rgba(45,142,240,0.1);  border:1px solid rgba(45,142,240,0.3); color:var(--blue); }

/* ── TOAST ── */
#toast {
  position:fixed; bottom:28px; right:28px;
  padding:14px 20px;
  background:var(--surface);
  border:1px solid var(--primary);
  border-radius:2px;
  color:var(--text);
  font-size:13px;
  z-index:9999;
  opacity:0;
  transform:translateY(10px);
  transition:all 0.3s;
  pointer-events:none;
  max-width:320px;
}

#toast.show { opacity:1; transform:translateY(0); }

/* ── PRIORITY INDICATOR ── */
.priority-tag {
  display:inline-flex; align-items:center; gap:6px;
  padding:4px 10px;
  border-radius:2px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:600;
}

.p-high   { background:rgba(200,51,10,0.15); color:var(--primary-light); border:1px solid rgba(200,51,10,0.3); }
.p-medium { background:rgba(232,160,32,0.12); color:var(--gold); border:1px solid rgba(232,160,32,0.3); }
.p-low    { background:rgba(29,184,122,0.1); color:var(--green); border:1px solid rgba(29,184,122,0.3); }

/* ── WINNER CARD ── */
.winner-card {
  background: linear-gradient(135deg, rgba(232,160,32,0.08), rgba(200,51,10,0.08));
  border: 1px solid rgba(232,160,32,0.3);
  border-radius:2px;
  padding:24px;
  display:flex; align-items:center; gap:20px;
  margin-bottom:16px;
}

.winner-trophy { font-size:40px; }

.winner-info h3 {
  font-family:'Rajdhani',sans-serif;
  font-size:20px; font-weight:700;
  color:var(--gold);
  margin-bottom:4px;
}

.winner-info p { font-size:13px; color:var(--text-muted); }

/* ── SCORE FORMULA ── */
.formula-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius:2px;
  padding:16px 20px;
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  color:var(--text-muted);
  margin-bottom:20px;
  line-height:2;
}

.formula-box .highlight { color:var(--primary-light); font-weight:600; }
.formula-box .value     { color:var(--gold); }

/* ── PAGES ── */
.page { display:none; }
.page.active { display:block; }

/* ── PROGRESS RING ── */
.progress-ring-wrap {
  display:flex; flex-direction:column; align-items:center; gap:6px;
}

/* ── NOTIFICATION DOT ── */
.nav-badge {
  margin-left:auto;
  background:var(--primary);
  color:#fff;
  font-size:10px; font-weight:700;
  padding:1px 6px; border-radius:10px;
  min-width:18px; text-align:center;
}

/* ── SECTION DIVIDER ── */
.section-sep {
  height:1px; background:var(--border2);
  margin:20px 0;
}

/* ── LOADING BAR ── */
.loading-bar {
  height:2px; background:var(--surface2);
  border-radius:1px; overflow:hidden; margin-bottom:8px;
}

.loading-fill {
  height:100%;
  background:linear-gradient(90deg, var(--primary), var(--gold));
  border-radius:1px;
  animation:loadFill 1.5s ease-out forwards;
}

@keyframes loadFill {
  from { width:0; }
  to   { width:var(--w,70%); }
}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .app-layout { grid-template-columns:1fr; }
  .sidebar { display:none; }
  .stat-grid { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-bg"></div>
  <div class="login-grid"></div>
  <div class="login-box">
    <div class="login-header">
      <div class="login-emblem">
        <div class="emblem-icon">🏛️</div>
        <div>
          <div class="login-title">Government of Tamil Nadu</div>
          <div class="login-subtitle">Problem Statement Priority<br>Auction System</div>
        </div>
      </div>
    </div>
    <div class="login-body">
      <div class="role-selector">
        <button class="role-btn active" onclick="selectRole('government')">🏛️ Govt</button>
        <button class="role-btn" onclick="selectRole('company')">🏢 Company</button>
        <button class="role-btn" onclick="selectRole('admin')">⚙️ Admin</button>
      </div>
      <div class="form-group">
        <label class="form-label">Username / ID</label>
        <input class="form-input" id="loginUser" placeholder="Enter your user ID" value="tn_govt_01"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="loginPass" placeholder="••••••••" value="pass123"/>
      </div>
      <button class="btn-login" onclick="doLogin()">ACCESS SYSTEM →</button>
      <div class="demo-hint">
        ⚡ Demo credentials pre-filled. Select a role and click ACCESS SYSTEM to explore that role's dashboard.
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     MAIN APP
══════════════════════════════════════ -->
<div id="app">
<div class="app-layout">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="brand-badge">TN-PSPAS</div>
      <div class="brand-name">Tamil Nadu Problem Statement Priority Auction System</div>
    </div>

//   SCORE ENGINE
// ══════════════════════════════════════
function calcCompanyScore(c) {
  return Math.round(
    0.40 * c.ontime +
    0.30 * c.quality +
    0.20 * c.feedback +
    0.10 * Math.min(c.projects, 50) * 2
  );
}

function evalBid(bidAmt, maxBid, minBid, companyScore) {
  const range = maxBid - minBid || 1;
  const bidScore = ((maxBid - bidAmt) / range) * 100;
  return Math.round(0.60 * bidScore + 0.40 * companyScore);
}

function getScoreColor(s) {
  if(s >= 80) return '#1db87a';
  if(s >= 60) return '#e8a020';
  return '#c8330a';
}

function getPriorityOrder(companies) {
  return [...companies].sort((a,b) => b.score - a.score);
}

function declareWinner(psId) {
  const p = DB.problems.find(p=>p.id===psId);
  const pBids = DB.bids.filter(b=>b.problemId===psId);
  if(!pBids.length){ showToast('No bids to evaluate'); return; }
  const maxBid = Math.max(...pBids.map(b=>b.amount));
  const minBid = Math.min(...pBids.map(b=>b.amount));
  const ranked = pBids.map(b => {
    const c = DB.companies.find(c=>c.id===b.companyId);
    return { ...b, company:c, finalScore: evalBid(b.amount,maxBid,minBid,c.score) };
  }).sort((a,b)=>b.finalScore-a.finalScore);
  const winner = ranked[0].company;
  showToast(`🏆 Winner declared! ${winner.name} wins ${psId}`);
  p.status = 'auction_closed';
  setTimeout(()=>showPage('results',null),800);
}

function results(el) {
  const closed = DB.problems.filter(p=>p.status==='auction_closed');

    <div class="page-title">Evaluation Results</div>
    <div class="page-subtitle">Final winners declared after performance-weighted evaluation</div>
  </div>
  <div class="formula-box">
    <span class="highlight">EVALUATION FORMULA:</span>
    Final Score = <span class="value">60%</span> × Normalized Bid Score + <span class="value">40%</span> × Company Performance Score<br>
    Bid Score = (MaxBid − CompanyBid) / (MaxBid − MinBid) × 100 &nbsp;|&nbsp; Lower bid = higher score
  </div>
  ${closed.map(p => {
    const pBids = DB.bids.filter(b=>b.problemId===p.id);
    if(!pBids.length) return '';
    const maxBid = Math.max(...pBids.map(b=>b.amount));
    const minBid = Math.min(...pBids.map(b=>b.amount));
    const ranked = pBids.map(b => {
      const c = DB.companies.find(c=>c.id===b.companyId);
      return { ...b, company:c, finalScore: evalBid(b.amount,maxBid,minBid,c.score) };
    }).sort((a,b)=>b.finalScore-a.finalScore);
    const winner = ranked[0];

    return `
    <div class="winner-card">
      <div class="winner-trophy">🏆</div>
      <div class="winner-info">
        <h3>${winner.company.name}</h3>
        <p>Won auction for: <strong style="color:var(--text)">${p.title}</strong></p>
        <p>Bid: ₹${(winner.amount/100000).toFixed(1)}L &nbsp;|&nbsp;
           Performance Score: ${winner.company.score} &nbsp;|&nbsp;
           Final Score: <strong style="color:var(--gold-light)">${winner.finalScore}</strong></p>
      </div>
      <div style="margin-left:auto">
        <span class="badge badge-red">${p.id}</span>
      </div>
    </div>`;
  }).join('') || '<div class="alert alert-info">No closed auctions yet. Declare winners from the Active Auctions page.</div>'}`;
}

function previewBid() {
  const psId = document.getElementById('bid_problem').value;
  const amt = parseInt(document.getElementById('bid_amount').value);
  if(!amt){ showToast('⚠ Enter bid amount first'); return; }
  const pBids = DB.bids.filter(b=>b.problemId===psId);
  const allAmounts = [...pBids.map(b=>b.amount), amt];
  const maxBid = Math.max(...allAmounts);
  const minBid = Math.min(...allAmounts);
  const fs = evalBid(amt, maxBid, minBid, myCompany.score);
  document.getElementById('bidPreview').innerHTML = `
  <div class="alert alert-success">
    📊 <strong>Score Preview:</strong> At ₹${(amt/100000).toFixed(1)}L bid →
    Bid Score component: ${Math.round(((maxBid-amt)/(maxBid-minBid||1))*100)} &nbsp;+&nbsp;
    Perf Score component: ${myCompany.score} →
    <strong>Final Score: ${fs}</strong> (vs ${pBids.length} existing bids)
  </div>`;
}

function submitBidFinal() {
  const psId = document.getElementById('bid_problem').value;
  const amt = parseInt(document.getElementById('bid_amount').value);
  if(!amt){ showToast('⚠ Enter bid amount'); return; }
  const newBid = {
    id: 'B00'+(DB.bids.length+1),
    problemId: psId, companyId: myCompany.id,
    amount: amt,
    submittedDate: new Date().toISOString().split('T')[0],
    status:'submitted'
  };
  DB.bids.push(newBid);
  showToast(`✓ Bid ${newBid.id} submitted for ${psId}!`);
  showPage('myBids', null);
}

            <td style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--primary-light)">${c.id}</td>
            <td style="color:var(--text)">${c.name}</td>
            <td><span class="badge badge-blue">${c.district}</span></td>
            <td>
              <div class="score-bar-wrap">
                <div class="score-bar"><div class="score-fill" style="width:${c.score}%;background:${getScoreColor(c.score)}"></div></div>
                <div class="score-val">${c.score}</div>
              </div>
            </td>
            <td style="font-family:'JetBrains Mono',monospace">${c.ontime}%</td>
            <td style="font-family:'JetBrains Mono',monospace">${c.quality}</td>
            <td style="font-family:'JetBrains Mono',monospace">${c.projects}</td>
            <td><span class="badge badge-green">ACTIVE</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function allProblems(el) { problemList(el); }

function scoreMgmt(el) {
  el.innerHTML = `
  <div class="page-header">
    <div class="page-title">Score Management</div>
    <div class="page-subtitle">Update company performance scores after project completion</div>
  </div>
  <div class="formula-box">
    <span class="highlight">Auto-Update Rule:</span> Scores are recalculated after every project completion.
    Manual override available for admin with audit trail.
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title">✏️ Update Company Score</div></div>
    <div class="card-body">
      <div class="form-row">
        <div class="field-group">
          <label class="field-label">Select Company</label>
          <select class="field-select" id="sc_company">
            ${DB.companies.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Related Project</label>
          <input class="field-input" placeholder="e.g. PS003 — Coimbatore Waste Mgmt"/>
        </div>
      </div>
      <div class="form-row triple">
        <div class="field-group">
          <label class="field-label">On-Time Rate (0–100)</label>
          <input class="field-input" id="sc_ontime" type="number" min="0" max="100" placeholder="e.g. 88"/>
        </div>
        <div class="field-group">
          <label class="field-label">Quality Rating (0–100)</label>
          <input class="field-input" id="sc_quality" type="number" min="0" max="100" placeholder="e.g. 82"/>
        </div>
        <div class="field-group">
          <label class="field-label">Client Feedback (0–100)</label>
          <input class="field-input" id="sc_feedback" type="number" min="0" max="100" placeholder="e.g. 90"/>
        </div>
      </div>
      <div id="scoreCalcPreview"></div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-outline" onclick="calcScorePreview()">🧮 CALCULATE PREVIEW</button>
        <button class="btn btn-primary" onclick="updateScoreFinal()">✓ UPDATE SCORE</button>
      </div>
    </div>
  </div>`;
}

function calcScorePreview() {
  const ot = parseInt(document.getElementById('sc_ontime').value)||0;
  const q  = parseInt(document.getElementById('sc_quality').value)||0;
  const f  = parseInt(document.getElementById('sc_feedback').value)||0;
  const cid = document.getElementById('sc_company').value;
  const c = DB.companies.find(x=>x.id===cid);
  const newScore = Math.round(0.4*ot + 0.3*q + 0.2*f + 0.1*Math.min(c.projects,50)*2);
  document.getElementById('scoreCalcPreview').innerHTML = `
  <div class="alert alert-info" style="margin-bottom:16px">
    📊 New calculated score = (40%×${ot}) + (30%×${q}) + (20%×${f}) + (10%×${Math.min(c.projects,50)*2})
    = <strong>${newScore}</strong> (Current: ${c.score})
    ${newScore > c.score ? ' <span style="color:var(--green)">↑ Improvement</span>' : ' <span style="color:var(--primary-light)">↓ Decrease</span>'}
  </div>`;
}

function updateScoreFinal() {
  const cid = document.getElementById('sc_company').value;
  const ot = parseInt(document.getElementById('sc_ontime').value)||0;
  const q  = parseInt(document.getElementById('sc_quality').value)||0;
  const f  = parseInt(document.getElementById('sc_feedback').value)||0;
  const c = DB.companies.find(x=>x.id===cid);
  if(ot && q && f) {
    c.ontime = ot; c.quality = q; c.feedback = f;
    c.score = calcCompanyScore(c);
    showToast(`✓ Score updated for ${c.name}: ${c.score}`);
  } else { showToast('⚠ Fill all score fields'); }
}

function auctionMonitor(el) { auctions(el); }

// ══════════════════════════════════════
//   TOAST
// ══════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
